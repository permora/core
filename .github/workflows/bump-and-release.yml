name: Bump and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify main is healthy
        run: pnpm verify

      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version "${{ inputs.bump }}" --no-git-tag-version | sed 's/^v//')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        id: changelog
        run: |
          RELEASE_BODY=$(node .github/scripts/release-changelog.mjs "${{ steps.version.outputs.version }}")
          {
            echo "body<<EOF"
            echo "$RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false

  publish:
    name: Publish to npm
    needs: bump
    if: needs.bump.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Check Node and npm versions
        run: |
          node --version
          npm --version
          node <<'EOF'
          const [nmaj, nmin, npat] = process.versions.node.split('.').map(Number);
          if (
            nmaj < 22 ||
            (nmaj === 22 && (nmin < 14 || (nmin === 14 && npat < 0)))
          ) {
            console.error(
              `Node ${process.versions.node}: trusted publishing requires >= 22.14.0`,
            );
            process.exit(1);
          }

          const { execSync } = require('node:child_process');
          const npmVer = execSync('npm --version', { encoding: 'utf8' }).trim();
          const [maj, min, pat] = npmVer.split('.').map(Number);
          if (
            maj < 11 ||
            (maj === 11 && (min < 5 || (min === 5 && pat < 1)))
          ) {
            console.error(
              `npm ${npmVer}: trusted publishing requires >= 11.5.1`,
            );
            process.exit(1);
          }

          console.log(`Node ${process.versions.node}, npm ${npmVer} — OK`);
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version matches tag
        run: |
          TAG="${{ needs.bump.outputs.tag }}"
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($EXPECTED)"
            exit 1
          fi

      - name: Verify
        run: pnpm verify

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
